services:
  - type: web
    name: wankers-bracket
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: wankers-bracket-db
          property: connectionString
      - key: ADMIN_KEY
        sync: false

databases:
  - name: wankers-bracket-db
    plan: free
    databaseName: wankers
    user: wankers
